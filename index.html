<h2>Prendre un rendez-vous</h2>

<form>
  <input type="text" placeholder="Nom et prénom" style="width:100%;padding:15px;margin:10px 0;"><br>

  <input type="tel" placeholder="Téléphone" style="width:100%;padding:15px;margin:10px 0;"><br>

  <select style="width:100%;padding:15px;margin:10px 0;">
    <option>Choisir une prestation</option>
    <option>Coiffure</option>
    <option>Pressing</option>
    <option>Lavage Auto</option>
    <option>Espace Évènementiel</option>
    <option>Boutique</option>
  </select><br>

  <input type="date" style="width:100%;padding:15px;margin:10px 0;"><br>

  <input type="time" style="width:100%;padding:15px;margin:10px 0;"><br>

  <textarea placeholder="Commentaire" style="width:100%;padding:15px;margin:10px 0;"></textarea><br>

  <button style="width:100%;padding:18px;background:#111;color:white;font-size:20px;">
    Envoyer le rendez-vous
  </button>
</form>
