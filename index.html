<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Au Monde de Chic Mymy</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:25px;
text-align:center;
}

header h1{
margin:0;
font-size:32px;
}

header p{
color:#ddd;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:15px;
margin-top:10px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:18px;
background:#000;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#444;
}
</style>

</head>

<body>

<header>
<h1>AU MONDE DE CHIC MYMY</h1>

<p>
Beauté • Pressing • Lavage Auto •
Espace Évènementiel
</p>

</header>

<div class="container">

<div class="card">

<h2>Prendre un rendez-vous</h2>

<input id="nom" placeholder="Nom et prénom">

<input id="telephone" placeholder="Téléphone">

<select id="service">

<option>Choisir une prestation</option>

<option>Coiffure</option>

<option>Pressing</option>

<option>Lavage Auto</option>

<option>Espace Évènementiel</option>

<option>Boutique</option>

</select>

<input type="date" id="date">

<input type="time" id="heure">

<textarea id="commentaire"
placeholder="Commentaire"></textarea>

<button>
ENVOYER LE RENDEZ-VOUS
</button>

</div>

</div>

</body>

</html>
