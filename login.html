<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion - Chic Mymy ERP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#000,#1a1a1a);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}
.login-box{
width:90%;
max-width:430px;
background:#111;
padding:40px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.5);
text-align:center;
}
.logo{
width:90px;
height:90px;
border-radius:18px;
object-fit:cover;
margin-bottom:20px;
}
h1{
color:#f7c600;
margin-bottom:10px;
}
p{
color:#ccc;
margin-bottom:30px;
}
.role{
display:block;
width:100%;
padding:16px;
margin:12px 0;
border-radius:35px;
text-decoration:none;
font-weight:bold;
font-size:17px;
}
.client{background:#f7c600;color:#111}
.employe{background:white;color:#111}
.directeur{background:#25d366;color:white}
.back{
display:block;
margin-top:25px;
color:#f7c600;
text-decoration:none;
}
</style>
</head>

<body>

<div class="login-box">
<img src="logo.jpg" class="logo" alt="Logo Chic Mymy">

<h1>Chic Mymy ERP</h1>
<p>Choisissez votre espace de connexion</p>

<a href="client.html" class="role client">👤 Espace Client</a>
<a href="employe.html" class="role employe">👷 Espace Employé</a>
<a href="directeur.html" class="role directeur">👑 Espace Directrice</a>

<a href="index.html" class="back">← Retour à l'accueil</a>
</div>

</body>
</html>
